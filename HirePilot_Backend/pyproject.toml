[tool.ruff]
# Longitud máxima de línea (100 es ideal para pantallas modernas)
line-length = 100
# Versión de Python a la que apuntamos
target-version = "py311"

[tool.ruff.lint]
# Seleccionamos las reglas que queremos aplicar:
# E: Errores de estilo (pep8)
# F: Errores lógicos (variables no usadas, etc.)
# I: Ordenamiento de imports (isort)
select = ["E", "F", "I"]
ignore = []

[tool.ruff.format]
# Usar comillas simples para strings que no sean docstrings
quote-style = "single"
# No cambiar el formato de los docstrings mágicamente
docstring-code-format = false