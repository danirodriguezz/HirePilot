# Proveedores que va a usar Nixpacks (debe ser una lista/array)
providers = ["node"]

# Opcional: Especificar la versión exacta de Node
[variables]
NIXPACKS_NODE_VERSION = "18"

# Fase 1: Instalación de dependencias
[phases.install]
cmds = ["npm install"]

# Fase 2: Construcción (Build)
[phases.build]
cmds = ["npm run build"]

# Fase 3: Comando de arranque (Cuando termina de montar el servicio)
[start]
cmd = "npx serve -s dist -l 3000"